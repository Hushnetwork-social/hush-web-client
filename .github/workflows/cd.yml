name: CD - Hush Web Client

on:
  # Trigger on version tags
  push:
    tags:
      - 'WebClient-v[0-9]+.[0-9]+.[0-9]+'

  # Manual trigger option
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., 1.2.3). Leave empty to use latest commit.'
        required: false
        type: string
      grpc_url:
        description: 'gRPC Server URL (default: https://api.hushnetwork.social)'
        required: false
        type: string
        default: 'https://api.hushnetwork.social'
      debug_logging:
        description: 'Enable debug logging (true/false)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hushnetwork-social/hush-webclient

jobs:
  # ============================================
  # CI GATE — must pass before deploying
  # ============================================
  ci:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Test
      run: npm run test:run

    - name: Build
      run: npm run build

  # ============================================
  # BUILD, PUSH & DEPLOY — only after CI passes
  # ============================================
  build-and-deploy:
    needs: [ci]
    runs-on: ubuntu-latest
    environment: HushServerNode AWS CD

    permissions:
      contents: write
      packages: write

    steps:
      # ============================================
      # CHECKOUT & VERSION EXTRACTION
      # ============================================

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.version }}" ]]; then
              VERSION="${{ inputs.version }}"
            else
              VERSION="manual-$(date +%Y%m%d-%H%M%S)"
            fi
          else
            # Extract version from tag: WebClient-v1.2.3 -> v1.2.3
            VERSION=${GITHUB_REF#refs/tags/WebClient-}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ============================================
      # BUILD & PUSH DOCKER IMAGE
      # ============================================

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            NEXT_PUBLIC_GRPC_URL=${{ inputs.grpc_url || 'https://api.hushnetwork.social' }}
            NEXT_PUBLIC_DEBUG_LOGGING=${{ inputs.debug_logging || 'false' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node.js for SP-08 web release hash
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Capture SP-08 web app release hashes
        id: web_release_hash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          NEXT_PUBLIC_GRPC_URL: ${{ inputs.grpc_url || 'https://api.hushnetwork.social' }}
          NEXT_PUBLIC_DEBUG_LOGGING: ${{ inputs.debug_logging || 'false' }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.version.outputs.version }}
          NEXT_TELEMETRY_DISABLED: '1'
          STANDALONE_BUILD: 'true'
        run: |
          set -euo pipefail
          npm ci
          npm run build

          mkdir -p release-evidence
          node_version="$(node --version)"
          npm_version="$(npm --version)"
          package_lock_hash="sha256:$(sha256sum package-lock.json | cut -d' ' -f1)"
          dockerfile_hash="sha256:$(sha256sum Dockerfile | cut -d' ' -f1)"
          build_id="$(cat .next/BUILD_ID)"
          static_tree_hash="sha256:$(find .next/static public -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1)"
          circuit_wasm_hash="sha256:$(sha256sum public/circuits/omega-v1.0.0/reaction.wasm | cut -d' ' -f1)"
          proving_key_hash="sha256:$(sha256sum public/circuits/omega-v1.0.0/reaction.zkey | cut -d' ' -f1)"
          app_release_hash="sha256:$(printf '%s\n%s\n%s\n%s\n%s\n' "${APP_VERSION}" "${build_id}" "${static_tree_hash}" "${circuit_wasm_hash}" "${proving_key_hash}" | sha256sum | cut -d' ' -f1)"

          {
            echo "node_version=${node_version}"
            echo "npm_version=${npm_version}"
            echo "package_lock_hash=${package_lock_hash}"
            echo "dockerfile_hash=${dockerfile_hash}"
            echo "build_id=${build_id}"
            echo "static_tree_hash=${static_tree_hash}"
            echo "circuit_wasm_hash=${circuit_wasm_hash}"
            echo "proving_key_hash=${proving_key_hash}"
            echo "app_release_hash=${app_release_hash}"
          } >> "$GITHUB_OUTPUT"

      - name: Write SP-08 web release component manifest
        env:
          IMAGE_DIGEST: ${{ steps.build_image.outputs.digest }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          GRPC_URL: ${{ inputs.grpc_url || 'https://api.hushnetwork.social' }}
          DEBUG_LOGGING: ${{ inputs.debug_logging || 'false' }}
          NODE_VERSION: ${{ steps.web_release_hash.outputs.node_version }}
          NPM_VERSION: ${{ steps.web_release_hash.outputs.npm_version }}
          PACKAGE_LOCK_HASH: ${{ steps.web_release_hash.outputs.package_lock_hash }}
          DOCKERFILE_HASH: ${{ steps.web_release_hash.outputs.dockerfile_hash }}
          BUILD_ID: ${{ steps.web_release_hash.outputs.build_id }}
          STATIC_TREE_HASH: ${{ steps.web_release_hash.outputs.static_tree_hash }}
          CIRCUIT_WASM_HASH: ${{ steps.web_release_hash.outputs.circuit_wasm_hash }}
          PROVING_KEY_HASH: ${{ steps.web_release_hash.outputs.proving_key_hash }}
          APP_RELEASE_HASH: ${{ steps.web_release_hash.outputs.app_release_hash }}
        run: |
          set -euo pipefail
          evidence_mode="development_placeholder"
          is_placeholder=true
          immutable_reference="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ -z "${IMAGE_DIGEST}" ]]; then
              echo "::error::Official SP-08 web evidence requires an immutable image digest."
              exit 1
            fi
            evidence_mode="official_sp08"
            is_placeholder=false
            immutable_reference="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          fi

          artifact_digest="${IMAGE_DIGEST:-sha256:$(printf '%s' "${GITHUB_SHA}:${IMAGE_TAG}:development-placeholder" | sha256sum | cut -d' ' -f1)}"
          mkdir -p release-evidence
          jq -n \
            --arg componentId "web_client" \
            --arg componentType "container_image" \
            --arg evidenceMode "${evidence_mode}" \
            --arg artifactName "hush-webclient" \
            --arg artifactDigest "${artifact_digest}" \
            --arg sourceCommit "${GITHUB_SHA}" \
            --arg sourceTag "${GITHUB_REF_NAME}" \
            --arg immutableReference "${immutable_reference}" \
            --arg buildWorkflowRunId "${GITHUB_RUN_ID}" \
            --arg distributionReference "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" \
            --arg packageLockHash "${PACKAGE_LOCK_HASH}" \
            --arg dockerfileHash "${DOCKERFILE_HASH}" \
            --arg nodeVersion "${NODE_VERSION}" \
            --arg npmVersion "${NPM_VERSION}" \
            --arg buildId "${BUILD_ID}" \
            --arg staticTreeHash "${STATIC_TREE_HASH}" \
            --arg circuitWasmHash "${CIRCUIT_WASM_HASH}" \
            --arg provingKeyHash "${PROVING_KEY_HASH}" \
            --arg appReleaseHash "${APP_RELEASE_HASH}" \
            --arg grpcUrl "${GRPC_URL}" \
            --arg debugLogging "${DEBUG_LOGGING}" \
            --argjson isPlaceholder "${is_placeholder}" \
            '{
              componentId: $componentId,
              componentType: $componentType,
              evidenceMode: $evidenceMode,
              artifactName: $artifactName,
              artifactDigest: $artifactDigest,
              sourceCommit: $sourceCommit,
              sourceTag: $sourceTag,
              immutableReference: $immutableReference,
              buildWorkflowRunId: $buildWorkflowRunId,
              distributionReference: $distributionReference,
              signingFingerprint: null,
              isPlaceholder: $isPlaceholder,
              packageLockHash: $packageLockHash,
              dockerfileHash: $dockerfileHash,
              nodeVersion: $nodeVersion,
              npmVersion: $npmVersion,
              buildId: $buildId,
              staticTreeHash: $staticTreeHash,
              circuitWasmHash: $circuitWasmHash,
              provingKeyHash: $provingKeyHash,
              appReleaseHash: $appReleaseHash,
              buildArgs: {
                nextPublicGrpcUrl: $grpcUrl,
                nextPublicDebugLogging: $debugLogging
              }
            }' > release-evidence/sp08-web-client-component.json

          {
            echo "### SP-08 Web Release Evidence"
            echo ""
            echo "- Evidence mode: \`${evidence_mode}\`"
            echo "- Image digest: \`${artifact_digest}\`"
            echo "- App release hash: \`${APP_RELEASE_HASH}\`"
            echo "- Static tree hash: \`${STATIC_TREE_HASH}\`"
            echo "- package-lock hash: \`${PACKAGE_LOCK_HASH}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SP-08 web release component manifest
        uses: actions/upload-artifact@v4
        with:
          name: sp08-web-client-release-component
          path: release-evidence/sp08-web-client-component.json

      - name: Publish SP-08 web release component manifest to GitHub Release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated SP-08 release evidence for ${GITHUB_REF_NAME}."
          gh release upload "${GITHUB_REF_NAME}" \
            release-evidence/sp08-web-client-component.json \
            --clobber

      - name: Summary - Image pushed
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      # ============================================
      # DEPLOY TO AWS LIGHTSAIL
      # ============================================

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem

          # Add host to known_hosts to avoid prompt
          ssh-keyscan -H ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to AWS Lightsail
        env:
          SSH_HOST: ${{ secrets.AWS_HOST }}
          SSH_USER: ${{ secrets.AWS_SSH_USER }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          GRPC_SERVER_URL: ${{ inputs.grpc_url || 'https://api.hushnetwork.social' }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          ssh -i ~/.ssh/lightsail.pem -o ServerAliveInterval=30 -o ServerAliveCountMax=10 ${SSH_USER}@${SSH_HOST} "IMAGE_TAG=${IMAGE_TAG}" "GRPC_SERVER_URL=${GRPC_SERVER_URL}" "GHCR_TOKEN=${GHCR_TOKEN}" "GHCR_IMAGE=${GHCR_IMAGE}" 'bash -s' << 'DEPLOY_SCRIPT'
            set -e

            echo "Starting Hush Web Client deployment of version ${IMAGE_TAG}..."

            # Login to GHCR
            echo "Logging in to GitHub Container Registry..."
            echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u github --password-stdin

            # Pull the new image
            echo "Pulling new image..."
            sudo docker pull ${GHCR_IMAGE}:${IMAGE_TAG}

            # Stop and remove any container using port 3001 (could be landing, old browser, or old webclient)
            echo "Stopping any container on port 3001..."
            CONTAINER_ON_PORT=$(sudo docker ps --filter "publish=3001" -q)
            if [ -n "$CONTAINER_ON_PORT" ]; then
              sudo docker stop $CONTAINER_ON_PORT || true
              sudo docker rm $CONTAINER_ON_PORT || true
            fi

            # Also clean up any old containers by name pattern
            sudo docker ps -aq --filter "name=HushNetworkChatApp" | xargs -r sudo docker rm -f || true
            sudo docker ps -aq --filter "name=HushNetworkBrowser" | xargs -r sudo docker rm -f || true
            sudo docker ps -aq --filter "name=HushWebClient" | xargs -r sudo docker rm -f || true

            # Start new container with version in name
            # GRPC_SERVER_URL connects API routes to HushNetworkNode via NGINX proxy
            CONTAINER_NAME="HushWebClient_${IMAGE_TAG}"
            GRPC_URL="${GRPC_SERVER_URL:-https://api.hushnetwork.social}"
            echo "Starting new container: ${CONTAINER_NAME}..."
            echo "gRPC Server URL: ${GRPC_URL}"
            sudo docker run -d \
              --name ${CONTAINER_NAME} \
              --restart always \
              --network HushNetwork \
              -e GRPC_SERVER_URL=${GRPC_URL} \
              -p 127.0.0.1:3001:3000 \
              ${GHCR_IMAGE}:${IMAGE_TAG}

            # Verify container is running
            echo "Verifying deployment..."
            sleep 5
            if sudo docker ps | grep -q "${CONTAINER_NAME}"; then
              echo "${CONTAINER_NAME} is running!"
              sudo docker ps --filter "name=HushWebClient" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            else
              echo "Container failed to start!"
              sudo docker logs ${CONTAINER_NAME} --tail 50
              exit 1
            fi

            echo "Hush Web Client deployment complete!"
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/lightsail.pem

      - name: Deployment Summary
        run: |
          echo "### Hush Web Client Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Container:** \`HushWebClient_${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** AWS Lightsail (Frankfurt)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** \`https://chat.hushnetwork.social\`" >> $GITHUB_STEP_SUMMARY

      # ============================================
      # TRIGGER DESKTOP & MOBILE BUILDS
      # ============================================

      - name: Trigger Tauri Desktop build
        if: success()
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          event-type: build-tauri
          client-payload: '{"version": "${{ steps.version.outputs.version }}", "triggered_by": "webclient"}'

      - name: Trigger Android build
        if: success()
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          event-type: build-android
          client-payload: '{"version": "${{ steps.version.outputs.version }}", "triggered_by": "webclient"}'

      - name: Triggered builds note
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Triggered Downstream Builds" >> $GITHUB_STEP_SUMMARY
          echo "- Tauri Desktop (Windows MSI)" >> $GITHUB_STEP_SUMMARY
          echo "- Android APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check [Actions](https://github.com/Hushnetwork-social/hush-web-client/actions) for build status." >> $GITHUB_STEP_SUMMARY
