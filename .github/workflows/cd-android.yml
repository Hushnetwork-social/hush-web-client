name: CD - Android App

on:
  # Trigger on version tags
  push:
    tags:
      - 'Android-v[0-9]+.[0-9]+.[0-9]+'

  # Trigger from WebClient deployment
  repository_dispatch:
    types: [build-android]

  # Manual trigger option
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.2.10)'
        required: false
        type: string

permissions:
  contents: write

env:
  REGISTRY: ghcr.io

jobs:
  build-android:
    runs-on: ubuntu-latest
    environment: HushServerNode AWS CD

    steps:
      # ============================================
      # CHECKOUT & VERSION EXTRACTION
      # ============================================

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # Triggered by WebClient deployment
            VERSION="${{ github.event.client_payload.version }}"
            # Remove 'v' prefix if present
            VERSION="${VERSION#v}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # Extract version from tag: Android-v0.2.10 -> 0.2.10
            VERSION=${GITHUB_REF#refs/tags/Android-v}
          else
            VERSION="manual-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ============================================
      # SETUP BUILD ENVIRONMENT
      # ============================================

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        run: |
          NDK_VERSION="27.0.11902837"
          NDK_PATH="$ANDROID_HOME/ndk/${NDK_VERSION}"
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "NDK_HOME=${NDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${NDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_NDK_VERSION=${NDK_VERSION}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      # ============================================
      # BUILD FRONTEND
      # ============================================

      - name: Install frontend dependencies
        run: npm ci

      - name: Create production environment file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > .env.production << EOF
          NEXT_PUBLIC_GRPC_URL=https://api.hushnetwork.social
          NEXT_PUBLIC_API_URL=https://chat.hushnetwork.social
          NEXT_PUBLIC_APP_VERSION=v${VERSION}
          EOF
          cp .env.production .env.local
          echo "Created production environment with version v${VERSION}"
          cat .env.production

      - name: Remove API routes for static export
        run: |
          rm -rf src/app/api
          echo "Removed API routes for static export"

      # ============================================
      # BUILD ANDROID APK
      # ============================================

      - name: Initialize Android project
        run: |
          npm run tauri android init || true
          echo "Android project initialized"

      - name: Update version in tauri.conf.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update version in tauri.conf.json
          jq ".version = \"${VERSION}\"" src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Updated tauri.conf.json version to ${VERSION}"

      - name: Setup Android signing
        id: android_signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode keystore from base64 secret
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/release.keystore
          echo "Keystore decoded to /tmp/release.keystore"

          # Verify keystore is valid and credentials match
          echo "Verifying keystore..."
          FILESIZE=$(stat -f%z /tmp/release.keystore 2>/dev/null || stat --printf="%s" /tmp/release.keystore 2>/dev/null)
          echo "Keystore file size: ${FILESIZE} bytes"

          # Test that store password works
          keytool -list -keystore /tmp/release.keystore -storepass "${ANDROID_KEYSTORE_PASSWORD}" > /dev/null 2>&1 \
            && echo "Store password: OK" \
            || { echo "ERROR: Store password does not match keystore"; exit 1; }

          # Show alias (masked password)
          ALIASES=$(keytool -list -keystore /tmp/release.keystore -storepass "${ANDROID_KEYSTORE_PASSWORD}" 2>/dev/null | grep "PrivateKeyEntry" || true)
          echo "Key entries found: ${ALIASES}"
          echo "Expected alias: ${ANDROID_KEY_ALIAS}"

          # Test key password
          keytool -exportcert -keystore /tmp/release.keystore -alias "${ANDROID_KEY_ALIAS}" -storepass "${ANDROID_KEYSTORE_PASSWORD}" -keypass "${ANDROID_KEY_PASSWORD}" > /dev/null 2>&1 \
            && echo "Key password: OK" \
            || echo "WARNING: Key password may not match (this is OK if storepass==keypass)"

          CERT_SHA256=$(keytool -list -v -keystore /tmp/release.keystore -alias "${ANDROID_KEY_ALIAS}" -storepass "${ANDROID_KEYSTORE_PASSWORD}" 2>/dev/null \
            | awk -F'SHA256: ' '/SHA256:/ { gsub(":", "", $2); print tolower($2); exit }')
          if [ -z "${CERT_SHA256}" ]; then
            echo "ERROR: Could not read signing certificate SHA-256 fingerprint"
            exit 1
          fi

          SIGNING_FINGERPRINT="sha256:${CERT_SHA256}"
          echo "signing_fingerprint=${SIGNING_FINGERPRINT}" >> "$GITHUB_OUTPUT"
          echo "Signing certificate SHA-256 fingerprint captured"

      - name: Setup Google Services
        run: |
          # Decode google-services.json from base64 secret
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > src-tauri/gen/android/app/google-services.json
          echo "google-services.json placed"

      - name: Build Android APK
        env:
          NEXT_PUBLIC_GRPC_URL: https://api.hushnetwork.social
          NEXT_PUBLIC_API_URL: https://chat.hushnetwork.social
          NEXT_PUBLIC_APP_VERSION: v${{ steps.version.outputs.version }}
          NEXT_PUBLIC_DEBUG_LOGGING: 'true'
          # Signing environment variables
          ANDROID_KEYSTORE_PATH: /tmp/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          npm run tauri android build -- --apk --ci --target aarch64
          echo "Android APK built"

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/release.keystore

      - name: Find and rename APK
        id: apk
        run: |
          # Find the release APK
          APK_PATH=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" 2>/dev/null | head -1)

          if [ -z "$APK_PATH" ]; then
            # Fallback: look for any APK
            APK_PATH=$(find src-tauri/gen/android -name "*.apk" 2>/dev/null | head -1)
          fi

          if [ -z "$APK_PATH" ]; then
            echo "APK file not found!"
            find src-tauri/gen/android -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB files found"
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          NEW_NAME="HushFeeds-v${VERSION}-release.apk"
          cp "$APK_PATH" "./${NEW_NAME}"

          echo "path=./${NEW_NAME}" >> $GITHUB_OUTPUT
          echo "filename=${NEW_NAME}" >> $GITHUB_OUTPUT
          echo "APK: ${NEW_NAME}"

      - name: Write SP-08 Android release component manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APK_FILE: ${{ steps.apk.outputs.path }}
          APK_FILENAME: ${{ steps.apk.outputs.filename }}
          SIGNING_FINGERPRINT: ${{ steps.android_signing.outputs.signing_fingerprint }}
        run: |
          set -euo pipefail

          evidence_mode="development_placeholder"
          is_placeholder=true
          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            evidence_mode="official_sp08"
            is_placeholder=false
          fi

          apk_digest="sha256:$(sha256sum "${APK_FILE}" | cut -d' ' -f1)"
          apk_size_bytes="$(stat -c%s "${APK_FILE}")"
          package_lock_hash="sha256:$(sha256sum package-lock.json | cut -d' ' -f1)"
          cargo_lock_hash="sha256:$(sha256sum src-tauri/Cargo.lock | cut -d' ' -f1)"
          tauri_conf_hash="sha256:$(sha256sum src-tauri/tauri.conf.json | cut -d' ' -f1)"
          product_name="$(jq -r '.productName' src-tauri/tauri.conf.json)"
          package_id="$(jq -r '.identifier' src-tauri/tauri.conf.json)"
          app_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          android_version_code="$(grep -E '^tauri\.android\.versionCode=' src-tauri/gen/android/app/tauri.properties 2>/dev/null | tail -1 | cut -d'=' -f2- || true)"
          android_version_name="$(grep -E '^tauri\.android\.versionName=' src-tauri/gen/android/app/tauri.properties 2>/dev/null | tail -1 | cut -d'=' -f2- || true)"
          android_version_code="${android_version_code:-${GITHUB_RUN_NUMBER}}"
          android_version_name="${android_version_name:-${VERSION}}"
          runtime_app_release_hash="sha256:$(printf '%s\n' "${package_id}" "${app_version}" "${android_version_code}" "${apk_digest}" "${SIGNING_FINGERPRINT}" | sha256sum | cut -d' ' -f1)"
          node_version="$(node --version)"
          npm_version="$(npm --version)"
          rust_version="$(rustc --version)"
          cargo_version="$(cargo --version)"
          java_version="$(java -version 2>&1 | head -1)"
          distribution_reference="https://downloads.hushnetwork.social/android/${APK_FILENAME}"
          immutable_reference="github-actions://${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${APK_FILENAME}#${apk_digest}"

          mkdir -p release-evidence
          jq -n \
            --arg componentId "mobile_app" \
            --arg componentType "android_apk" \
            --arg evidenceMode "${evidence_mode}" \
            --arg artifactName "${APK_FILENAME}" \
            --arg artifactDigest "${apk_digest}" \
            --arg sourceCommit "${GITHUB_SHA}" \
            --arg sourceTag "${GITHUB_REF_NAME}" \
            --arg immutableReference "${immutable_reference}" \
            --arg buildWorkflowRunId "${GITHUB_RUN_ID}" \
            --arg distributionReference "${distribution_reference}" \
            --arg signingFingerprint "${SIGNING_FINGERPRINT}" \
            --arg packageId "${package_id}" \
            --arg productName "${product_name}" \
            --arg appVersion "${app_version}" \
            --arg androidVersionName "${android_version_name}" \
            --arg androidVersionCode "${android_version_code}" \
            --arg runtimeAppReleaseHash "${runtime_app_release_hash}" \
            --arg distributionChannel "downloads.hushnetwork.social/android" \
            --arg nodeVersion "${node_version}" \
            --arg npmVersion "${npm_version}" \
            --arg rustVersion "${rust_version}" \
            --arg cargoVersion "${cargo_version}" \
            --arg javaVersion "${java_version}" \
            --arg androidNdkVersion "${ANDROID_NDK_VERSION}" \
            --arg packageLockHash "${package_lock_hash}" \
            --arg cargoLockHash "${cargo_lock_hash}" \
            --arg tauriConfHash "${tauri_conf_hash}" \
            --argjson apkSizeBytes "${apk_size_bytes}" \
            --argjson isPlaceholder "${is_placeholder}" \
            '{
              componentId: $componentId,
              componentType: $componentType,
              evidenceMode: $evidenceMode,
              artifactName: $artifactName,
              artifactDigest: $artifactDigest,
              sourceCommit: $sourceCommit,
              sourceTag: $sourceTag,
              immutableReference: $immutableReference,
              buildWorkflowRunId: $buildWorkflowRunId,
              distributionReference: $distributionReference,
              signingFingerprint: $signingFingerprint,
              isPlaceholder: $isPlaceholder,
              packageId: $packageId,
              productName: $productName,
              appVersion: $appVersion,
              androidVersionName: $androidVersionName,
              androidVersionCode: $androidVersionCode,
              runtimeAppReleaseHash: $runtimeAppReleaseHash,
              distributionChannel: $distributionChannel,
              apkSizeBytes: $apkSizeBytes,
              toolchain: {
                nodeVersion: $nodeVersion,
                npmVersion: $npmVersion,
                rustVersion: $rustVersion,
                cargoVersion: $cargoVersion,
                javaVersion: $javaVersion,
                androidNdkVersion: $androidNdkVersion
              },
              sourceHashes: {
                packageLockHash: $packageLockHash,
                cargoLockHash: $cargoLockHash,
                tauriConfHash: $tauriConfHash
              }
            }' > release-evidence/sp08-android-component.json

          {
            echo "### SP-08 Android Release Evidence"
            echo ""
            echo "- Evidence mode: \`${evidence_mode}\`"
            echo "- APK digest: \`${apk_digest}\`"
            echo "- Runtime app release hash: \`${runtime_app_release_hash}\`"
            echo "- APK size: \`${apk_size_bytes}\` bytes"
            echo "- Distribution: \`${distribution_reference}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android APK release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ${{ steps.apk.outputs.path }}

      - name: Upload SP-08 Android release component manifest
        uses: actions/upload-artifact@v4
        with:
          name: sp08-android-release-component
          path: release-evidence/sp08-android-component.json

      - name: Publish SP-08 Android release component manifest to GitHub Release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated SP-08 release evidence for ${GITHUB_REF_NAME}."
          gh release upload "${GITHUB_REF_NAME}" \
            release-evidence/sp08-android-component.json \
            --clobber

      # ============================================
      # UPLOAD TO DOWNLOADS SERVER
      # ============================================

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload APK to downloads server
        env:
          SSH_HOST: ${{ secrets.AWS_HOST }}
          SSH_USER: ${{ secrets.AWS_SSH_USER }}
          VERSION: ${{ steps.version.outputs.version }}
          APK_FILE: ${{ steps.apk.outputs.path }}
          APK_FILENAME: ${{ steps.apk.outputs.filename }}
        run: |
          # Calculate SHA256
          SHA256=$(sha256sum "$APK_FILE" | cut -d' ' -f1)
          SIZE=$(ls -lh "$APK_FILE" | awk '{print $5}')

          echo "Size: $SIZE, SHA256: ${SHA256:0:16}..."

          # Upload APK file
          echo "Uploading to downloads server..."
          scp -i ~/.ssh/lightsail.pem "$APK_FILE" ${SSH_USER}@${SSH_HOST}:/mnt/hush_db_data/downloads/android/

          # Update releases.json
          echo "Updating releases.json..."
          ssh -i ~/.ssh/lightsail.pem ${SSH_USER}@${SSH_HOST} << UPDATEJSON
            cd /mnt/hush_db_data/downloads
            jq '.android.version = "${VERSION}" |
                .android.filename = "${APK_FILENAME}" |
                .android.url = "https://downloads.hushnetwork.social/android/${APK_FILENAME}" |
                .android.size = "${SIZE}" |
                .android.sha256 = "${SHA256}" |
                .lastUpdated = "$(date -u +%Y-%m-%dT%H:%M:%SZ)"' \
              releases.json > tmp.json && mv tmp.json releases.json
            echo "releases.json updated"
            cat releases.json
          UPDATEJSON

          echo "Uploaded ${APK_FILENAME} to downloads.hushnetwork.social"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/lightsail.pem

      # ============================================
      # BUILD SUMMARY
      # ============================================

      - name: Build Summary
        run: |
          echo "### Android APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** \`${{ steps.apk.outputs.filename }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** [downloads.hushnetwork.social/android/${{ steps.apk.outputs.filename }}](https://downloads.hushnetwork.social/android/${{ steps.apk.outputs.filename }})" >> $GITHUB_STEP_SUMMARY
