message ApprovedClientApplication {
  string ApplicationId = 1;
  string Version = 2;
}

message OutcomeRule {
  OutcomeRuleKindProto Kind = 1;
  string TemplateKey = 2;
  int32 SeatCount = 3;
  bool BlankVoteCountsForTurnout = 4;
  bool BlankVoteExcludedFromWinnerSelection = 5;
  bool BlankVoteExcludedFromThresholdDenominator = 6;
  string TieResolutionRule = 7;
  string CalculationBasis = 8;
}

message ElectionOption {
  string OptionId = 1;
  string DisplayLabel = 2;
  string ShortDescription = 3;
  int32 BallotOrder = 4;
  bool IsBlankOption = 5;
}

message ElectionMetadata {
  string Title = 1;
  string ShortDescription = 2;
  string OwnerPublicAddress = 3;
  string ExternalReferenceCode = 4;
}

message ElectionFrozenPolicy {
  ElectionClassProto ElectionClass = 1;
  ElectionBindingStatusProto BindingStatus = 2;
  ElectionGovernanceModeProto GovernanceMode = 3;
  ElectionDisclosureModeProto DisclosureMode = 4;
  ParticipationPrivacyModeProto ParticipationPrivacyMode = 5;
  VoteUpdatePolicyProto VoteUpdatePolicy = 6;
  EligibilitySourceTypeProto EligibilitySourceType = 7;
  EligibilityMutationPolicyProto EligibilityMutationPolicy = 8;
  OutcomeRule OutcomeRule = 9;
  repeated ApprovedClientApplication ApprovedClientApplications = 10;
  string ProtocolOmegaVersion = 11;
  ReportingPolicyProto ReportingPolicy = 12;
  ReviewWindowPolicyProto ReviewWindowPolicy = 13;
  optional int32 RequiredApprovalCount = 14;
  string SelectedProfileId = 15;
  bool SelectedProfileDevOnly = 16;
}

message ElectionTrusteeReference {
  string TrusteeUserAddress = 1;
  string TrusteeDisplayName = 2;
}

message ElectionTrusteeBoundarySnapshot {
  int32 RequiredApprovalCount = 1;
  repeated ElectionTrusteeReference AcceptedTrustees = 2;
