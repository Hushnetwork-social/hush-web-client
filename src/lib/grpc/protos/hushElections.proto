syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "HushNetwork.proto";

package rpcHush;

service HushElections {
  rpc CreateElectionDraft(CreateElectionDraftRequest) returns (ElectionCommandResponse);
  rpc UpdateElectionDraft(UpdateElectionDraftRequest) returns (ElectionCommandResponse);
  rpc InviteElectionTrustee(InviteElectionTrusteeRequest) returns (ElectionCommandResponse);
  rpc CreateElectionReportAccessGrant(CreateElectionReportAccessGrantRequest) returns (ElectionCommandResponse);
  rpc AcceptElectionTrusteeInvitation(ResolveElectionTrusteeInvitationRequest) returns (ElectionCommandResponse);
  rpc RejectElectionTrusteeInvitation(ResolveElectionTrusteeInvitationRequest) returns (ElectionCommandResponse);
  rpc RevokeElectionTrusteeInvitation(ResolveElectionTrusteeInvitationRequest) returns (ElectionCommandResponse);
  rpc StartElectionCeremony(StartElectionCeremonyRequest) returns (ElectionCommandResponse);
  rpc RestartElectionCeremony(RestartElectionCeremonyRequest) returns (ElectionCommandResponse);
  rpc PublishElectionCeremonyTransportKey(PublishElectionCeremonyTransportKeyRequest) returns (ElectionCommandResponse);
  rpc JoinElectionCeremony(JoinElectionCeremonyRequest) returns (ElectionCommandResponse);
  rpc RecordElectionCeremonySelfTestSuccess(RecordElectionCeremonySelfTestRequest) returns (ElectionCommandResponse);
  rpc SubmitElectionCeremonyMaterial(SubmitElectionCeremonyMaterialRequest) returns (ElectionCommandResponse);
  rpc RecordElectionCeremonyValidationFailure(RecordElectionCeremonyValidationFailureRequest) returns (ElectionCommandResponse);
  rpc CompleteElectionCeremonyTrustee(CompleteElectionCeremonyTrusteeRequest) returns (ElectionCommandResponse);
  rpc RecordElectionCeremonyShareExport(RecordElectionCeremonyShareExportRequest) returns (ElectionCommandResponse);
  rpc RecordElectionCeremonyShareImport(RecordElectionCeremonyShareImportRequest) returns (ElectionCommandResponse);
  rpc GetElectionOpenReadiness(GetElectionOpenReadinessRequest) returns (GetElectionOpenReadinessResponse);
  rpc StartElectionGovernedProposal(StartElectionGovernedProposalRequest) returns (ElectionCommandResponse);
  rpc ApproveElectionGovernedProposal(ApproveElectionGovernedProposalRequest) returns (ElectionCommandResponse);
  rpc RetryElectionGovernedProposalExecution(RetryElectionGovernedProposalExecutionRequest) returns (ElectionCommandResponse);
  rpc OpenElection(OpenElectionRequest) returns (ElectionCommandResponse);
  rpc CloseElection(CloseElectionRequest) returns (ElectionCommandResponse);
  rpc FinalizeElection(FinalizeElectionRequest) returns (ElectionCommandResponse);
  rpc RegisterElectionVotingCommitment(RegisterElectionVotingCommitmentRequest) returns (RegisterElectionVotingCommitmentResponse);
  rpc AcceptElectionBallotCast(AcceptElectionBallotCastRequest) returns (AcceptElectionBallotCastResponse);
  rpc GetElection(GetElectionRequest) returns (GetElectionResponse);
  rpc SearchElectionDirectory(SearchElectionDirectoryRequest) returns (SearchElectionDirectoryResponse);
  rpc GetElectionHubView(GetElectionHubViewRequest) returns (GetElectionHubViewResponse);
  rpc GetElectionEligibilityView(GetElectionEligibilityViewRequest) returns (GetElectionEligibilityViewResponse);
  rpc GetElectionVotingView(GetElectionVotingViewRequest) returns (GetElectionVotingViewResponse);
  rpc VerifyElectionReceipt(VerifyElectionReceiptRequest) returns (VerifyElectionReceiptResponse);
  rpc GetElectionEnvelopeAccess(GetElectionEnvelopeAccessRequest) returns (GetElectionEnvelopeAccessResponse);
  rpc GetElectionResultView(GetElectionResultViewRequest) returns (GetElectionResultViewResponse);
  rpc GetElectionReportAccessGrants(GetElectionReportAccessGrantsRequest) returns (GetElectionReportAccessGrantsResponse);
  rpc GetElectionCeremonyActionView(GetElectionCeremonyActionViewRequest) returns (GetElectionCeremonyActionViewResponse);
  rpc GetElectionsByOwner(GetElectionsByOwnerRequest) returns (GetElectionsByOwnerResponse);
}

enum ElectionLifecycleStateProto {
  Draft = 0;
  Open = 1;
  Closed = 2;
  Finalized = 3;
}

enum ElectionClassProto {
  OrganizationalRemoteVoting = 0;
  PrivatePoll = 1;
  SeriousSecretBallotVoting = 2;
}

enum ElectionBindingStatusProto {
  Binding = 0;
  NonBinding = 1;
}

enum ElectionGovernanceModeProto {
  AdminOnly = 0;
  TrusteeThreshold = 1;
}

enum ElectionDisclosureModeProto {
  FinalResultsOnly = 0;
  SeparatedParticipationAndResultReports = 1;
  SeparatedParticipationAndPlaintextBallotReports = 2;
}

enum ParticipationPrivacyModeProto {
  PublicCheckoffAnonymousBallotPrivateChoice = 0;
}

enum VoteUpdatePolicyProto {
  SingleSubmissionOnly = 0;
