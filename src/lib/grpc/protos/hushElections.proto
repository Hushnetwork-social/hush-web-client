  string ProfileVersion = 5;
  int32 TrusteeCount = 6;
  int32 RequiredApprovalCount = 7;
  bool DevOnly = 8;
  google.protobuf.Timestamp RegisteredAt = 9;
  google.protobuf.Timestamp LastUpdatedAt = 10;
}

message ElectionCurvePoint {
